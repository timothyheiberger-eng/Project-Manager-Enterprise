<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Project Manager Enterprise Ver. 1.0</title>
<style>
:root{--bg:#0b1220;--panel:#111c2f;--panel2:#17243a;--card:#ffffff;--ink:#0f172a;--muted:#64748b;--line:#d9e2ef;--brand:#2563eb;--brand2:#0ea5e9;--good:#16a34a;--warn:#d97706;--bad:#dc2626;--soft:#f8fafc}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:#eef3f9;color:var(--ink)}header{background:linear-gradient(135deg,#07111f,#12335f 60%,#0ea5e9);color:white;padding:18px 18px 14px;position:sticky;top:0;z-index:20;box-shadow:0 8px 22px #0002}.brand{display:flex;align-items:center;gap:12px}.logo{width:46px;height:46px;border-radius:12px;background:#fff;color:#12335f;display:grid;place-items:center;font-weight:900;letter-spacing:-1px}h1{font-size:24px;margin:0}.sub{opacity:.86;font-size:13px;margin-top:4px}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}button,.btn{border:0;border-radius:10px;padding:10px 13px;background:var(--brand);color:white;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block}button.secondary{background:#334155}button.good{background:var(--good)}button.warn{background:var(--warn)}button.bad{background:var(--bad)}button.light{background:white;color:#12335f}main{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 104px)}nav{background:#0f172a;color:white;padding:16px;position:sticky;top:104px;height:calc(100vh - 104px);overflow:auto}.navbtn{width:100%;text-align:left;margin:4px 0;background:transparent;color:#dbeafe;border:1px solid #ffffff14}.navbtn.active{background:#2563eb;color:white}.content{padding:18px;overflow:auto}.section{display:none}.section.active{display:block}.grid{display:grid;grid-template-columns:repeat(4,minmax(160px,1fr));gap:14px}.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.card{background:white;border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:0 6px 18px #1e293b12}.kpi{font-size:30px;font-weight:900;color:#12335f}.label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}.card h2,.card h3{margin-top:0}.formgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}label{font-size:12px;font-weight:800;color:#334155}input,select,textarea{width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:10px;background:#fff;font:inherit}textarea{min-height:82px}table{width:100%;border-collapse:collapse;background:white;border-radius:12px;overflow:hidden}th,td{border-bottom:1px solid #e2e8f0;padding:9px;text-align:left;font-size:13px;vertical-align:top}th{background:#f1f5f9;color:#334155;font-size:12px;text-transform:uppercase}.pill{padding:4px 8px;border-radius:999px;font-size:12px;font-weight:800;display:inline-block}.Open,.Pending,.Submitted,.Draft,.Active{background:#dbeafe;color:#1d4ed8}.Approved,.Closed,.Paid,.Complete{background:#dcfce7;color:#166534}.Overdue,.Rejected,.Critical{background:#fee2e2;color:#991b1b}.Review,.In-Review,.Partial{background:#fef3c7;color:#92400e}.notice{background:#fff7ed;border-left:5px solid #f97316;padding:12px;border-radius:10px;color:#7c2d12}.right{text-align:right}.small{font-size:12px;color:#64748b}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.tab{background:#e2e8f0;color:#0f172a}.tab.active{background:#0f172a;color:white}.printOnly{display:none}.doclink{word-break:break-all;color:#2563eb}@media(max-width:900px){main{grid-template-columns:1fr}nav{position:relative;top:auto;height:auto;display:grid;grid-template-columns:repeat(2,1fr);gap:6px}.grid{grid-template-columns:repeat(2,1fr)}.grid2,.formgrid{grid-template-columns:1fr}header{position:relative}nav{top:auto}}@media print{header,nav,.noPrint,button{display:none!important}main{display:block}.content{padding:0}.section{display:block;page-break-after:always}.card{box-shadow:none;border:1px solid #999}.printOnly{display:block}}
</style>
</head>
<body>
<header>
  <div class="brand"><div class="logo">PME</div><div><h1>Project Manager Enterprise Ver. 1.0</h1><div class="sub">Commercial Construction Management • Local Browser Database • GitHub Pages Ready</div></div></div>
  <div class="toolbar noPrint"><button onclick="backupData()">Backup JSON</button><button class="secondary" onclick="document.getElementById('restoreFile').click()">Restore JSON</button><input id="restoreFile" type="file" accept="application/json" style="display:none" onchange="restoreData(event)"><button class="light" onclick="window.print()">Print Reports</button><button class="warn" onclick="seedDemo()">Load Demo Data</button><button class="bad" onclick="resetAll()">Reset</button></div>
</header>
<main>
<nav id="nav"></nav>
<div class="content">
  <section id="dashboard" class="section active"><div class="grid" id="kpis"></div><div class="grid2" style="margin-top:14px"><div class="card"><h3>Executive Project Snapshot</h3><div id="snapshot"></div></div><div class="card"><h3>Alerts</h3><div id="alerts"></div></div></div></section>
  <section id="projects" class="section"></section>
  <section id="precon" class="section"></section>
  <section id="clients" class="section"></section>
  <section id="subs" class="section"></section>
  <section id="rfis" class="section"></section>
  <section id="submittals" class="section"></section>
  <section id="procurement" class="section"></section>
  <section id="budget" class="section"></section>
  <section id="schedule" class="section"></section>
  <section id="contracts" class="section"></section>
  <section id="payapps" class="section"></section>
  <section id="changes" class="section"></section>
  <section id="daily" class="section"></section>
  <section id="punch" class="section"></section>
  <section id="documents" class="section"></section>
  <section id="reports" class="section"></section>
</div>
</main>
<script>
const KEY='project_manager_enterprise_v1';
const modules=[['dashboard','Dashboard'],['projects','Projects'],['precon','Preconstruction'],['clients','Clients / Owners'],['subs','Subcontractors'],['rfis','RFI Log'],['submittals','Submittal Log'],['procurement','Procurement'],['budget','Budget'],['schedule','Schedule'],['contracts','Contracts'],['payapps','Pay Apps'],['changes','Change Orders'],['daily','Daily Reports'],['punch','Punch / Closeout'],['documents','Document Control'],['reports','Reports']];
const blank={projects:[],precon:[],clients:[],subs:[],rfis:[],submittals:[],procurement:[],budget:[],schedule:[],contracts:[],payapps:[],changes:[],daily:[],punch:[],documents:[]};
let db=JSON.parse(localStorage.getItem(KEY)||JSON.stringify(blank));
function save(){localStorage.setItem(KEY,JSON.stringify(db));renderAll()}
function uid(p){return p+'-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,6)}
function money(n){return '$'+Number(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}
function today(){return new Date().toISOString().slice(0,10)}
function nav(){document.getElementById('nav').innerHTML=modules.map(m=>`<button class="navbtn ${m[0]=='dashboard'?'active':''}" onclick="show('${m[0]}',this)">${m[1]}</button>`).join('')}
function show(id,btn){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.navbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderAll()}
function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function status(s){return `<span class="pill ${String(s||'Open').replaceAll(' ','-')}">${esc(s||'Open')}</span>`}
function del(type,id){if(confirm('Delete this item?')){db[type]=db[type].filter(x=>x.id!==id);save()}}
function add(type,obj){db[type].push({id:uid(type),date:today(),...obj});save()}
function options(arr,label='name'){return '<option value="">Select...</option>'+arr.map(x=>`<option>${esc(x[label]||x.projectName||x.company||x.title)}</option>`).join('')}
function form(title,fields,type){return `<div class="card"><h2>${title}</h2><div class="formgrid">${fields.map(f=>`<div><label>${f[1]}</label>${input(f)}</div>`).join('')}</div><p><button onclick="submitForm('${type}')">Save ${title}</button></p></div>`}
function input(f){let [k,l,t,opts]=f;if(t=='textarea')return `<textarea id="${k}"></textarea>`;if(t=='select')return `<select id="${k}">${opts}</select>`;return `<input id="${k}" type="${t||'text'}">`}
function submitForm(type){let inputs=document.querySelectorAll(`#${type} input,#${type} select,#${type} textarea`), obj={};inputs.forEach(i=>obj[i.id]=i.value); add(type,obj); inputs.forEach(i=>i.value='')}
function table(type,cols){let rows=db[type].map(r=>`<tr>${cols.map(c=>`<td>${c[2]=='status'?status(r[c[0]]):esc(r[c[0]])}</td>`).join('')}<td class="noPrint"><button class="bad" onclick="del('${type}','${r.id}')">Delete</button></td></tr>`).join('');return `<div class="card"><h3>${type[0].toUpperCase()+type.slice(1)} Log</h3><table><thead><tr>${cols.map(c=>`<th>${c[1]}</th>`).join('')}<th class="noPrint">Action</th></tr></thead><tbody>${rows||'<tr><td colspan="10">No records yet.</td></tr>'}</tbody></table></div>`}
function renderAll(){renderDashboard();renderModules();}
function renderDashboard(){let openRFIs=db.rfis.filter(x=>x.status!='Closed').length;let subOpen=db.submittals.filter(x=>!['Approved','Closed'].includes(x.status)).length;let budget=db.budget.reduce((a,x)=>a+Number(x.budget||0),0);let committed=db.budget.reduce((a,x)=>a+Number(x.committed||0),0);let actual=db.budget.reduce((a,x)=>a+Number(x.actual||0),0);let co=db.changes.reduce((a,x)=>a+Number(x.amount||0),0);document.getElementById('kpis').innerHTML=[['Projects',db.projects.length],['Open RFIs',openRFIs],['Open Submittals',subOpen],['Budget',money(budget)],['Committed',money(committed)],['Actual Cost',money(actual)],['Change Orders',money(co)],['Long Lead Items',db.procurement.filter(x=>x.longLead=='Yes').length]].map(k=>`<div class="card"><div class="label">${k[0]}</div><div class="kpi">${k[1]}</div></div>`).join('');document.getElementById('snapshot').innerHTML=`<p><b>Total Contract Value:</b> ${money(db.contracts.reduce((a,x)=>a+Number(x.amount||0),0))}</p><p><b>Owner Billing:</b> ${money(db.payapps.reduce((a,x)=>a+Number(x.amount||0),0))}</p><p><b>Open Punch Items:</b> ${db.punch.filter(x=>x.status!='Closed').length}</p><p><b>Daily Reports:</b> ${db.daily.length}</p>`;let alerts=[];db.procurement.filter(x=>x.status!='Received').forEach(x=>alerts.push(`Procurement: ${x.item||'Item'} - ${x.status||'Open'}`));db.subs.filter(x=>x.coiExp && x.coiExp < today()).forEach(x=>alerts.push(`Expired COI: ${x.company}`));document.getElementById('alerts').innerHTML=alerts.length?alerts.map(a=>`<div class="notice">${esc(a)}</div><br>`).join(''):'<p>No current alerts.</p>'}
function renderModules(){
 document.getElementById('projects').innerHTML=form('Add Project',[['projectName','Project Name'],['number','Project No.'],['client','Client'],['location','Location'],['start','Start Date','date'],['finish','Finish Date','date'],['status','Status','select','<option>Active</option><option>Pending</option><option>Complete</option>'],['description','Description','textarea']],'projects')+table('projects',[['projectName','Project'],['number','No.'],['client','Client'],['location','Location'],['status','Status','status']]);
 document.getElementById('precon').innerHTML=form('Preconstruction Entry',[['project','Project','select',options(db.projects,'projectName')],['type','Type','select','<option>Permit</option><option>Buyout</option><option>Bid Package</option><option>Bid Comparison</option><option>Plan Review</option><option>Utility Coordination</option><option>Value Engineering</option><option>Allowance</option><option>Owner Selection</option><option>Notice to Proceed</option>'],['title','Title'],['responsible','Responsible Party'],['due','Due Date','date'],['status','Status','select','<option>Open</option><option>Pending</option><option>Submitted</option><option>Approved</option><option>Closed</option><option>Overdue</option>'],['notes','Notes','textarea']],'precon')+table('precon',[['project','Project'],['type','Type'],['title','Title'],['responsible','Responsible'],['due','Due'],['status','Status','status']]);
 document.getElementById('clients').innerHTML=form('Add Client / Owner',[['name','Client / Owner Name'],['contact','Contact'],['phone','Phone'],['email','Email'],['address','Address'],['notes','Notes','textarea']],'clients')+table('clients',[['name','Name'],['contact','Contact'],['phone','Phone'],['email','Email'],['address','Address']]);
 document.getElementById('subs').innerHTML=form('Add Subcontractor',[['company','Company'],['trade','Trade'],['contact','Contact'],['phone','Phone'],['email','Email'],['coiExp','COI Expiration','date'],['license','License'],['notes','Notes','textarea']],'subs')+table('subs',[['company','Company'],['trade','Trade'],['contact','Contact'],['phone','Phone'],['coiExp','COI Exp.']]);
 document.getElementById('rfis').innerHTML=form('RFI',[['project','Project','select',options(db.projects,'projectName')],['number','RFI No.'],['subject','Subject'],['to','To'],['due','Due Date','date'],['status','Status','select','<option>Open</option><option>In Review</option><option>Answered</option><option>Closed</option><option>Overdue</option>'],['question','Question','textarea'],['answer','Answer','textarea']],'rfis')+table('rfis',[['project','Project'],['number','RFI No.'],['subject','Subject'],['to','To'],['due','Due'],['status','Status','status']]);
 document.getElementById('submittals').innerHTML=form('Submittal',[['project','Project','select',options(db.projects,'projectName')],['number','Submittal No.'],['spec','Spec Section'],['title','Title'],['sub','Subcontractor'],['due','Due Date','date'],['status','Status','select','<option>Draft</option><option>Submitted</option><option>In Review</option><option>Approved</option><option>Rejected</option><option>Closed</option>'],['notes','Notes','textarea']],'submittals')+table('submittals',[['project','Project'],['number','No.'],['spec','Spec'],['title','Title'],['sub','Sub'],['due','Due'],['status','Status','status']]);
 document.getElementById('procurement').innerHTML=form('Procurement Item',[['project','Project','select',options(db.projects,'projectName')],['item','Item'],['vendor','Vendor'],['po','PO / Order No.'],['needBy','Need By','date'],['eta','ETA','date'],['longLead','Long Lead','select','<option>No</option><option>Yes</option>'],['status','Status','select','<option>Open</option><option>Ordered</option><option>Partial</option><option>Received</option><option>Delayed</option><option>Critical</option>'],['notes','Notes','textarea']],'procurement')+table('procurement',[['project','Project'],['item','Item'],['vendor','Vendor'],['needBy','Need By'],['eta','ETA'],['longLead','Long Lead'],['status','Status','status']]);
 document.getElementById('budget').innerHTML=form('Budget Cost Code',[['project','Project','select',options(db.projects,'projectName')],['code','Cost Code'],['description','Description'],['budget','Budget','number'],['committed','Committed','number'],['actual','Actual','number'],['notes','Notes','textarea']],'budget')+table('budget',[['project','Project'],['code','Code'],['description','Description'],['budget','Budget'],['committed','Committed'],['actual','Actual']]);
 document.getElementById('schedule').innerHTML=form('Schedule / Milestone',[['project','Project','select',options(db.projects,'projectName')],['activity','Activity'],['start','Start','date'],['finish','Finish','date'],['percent','% Complete','number'],['status','Status','select','<option>Pending</option><option>Active</option><option>Complete</option><option>Overdue</option>'],['notes','Notes','textarea']],'schedule')+table('schedule',[['project','Project'],['activity','Activity'],['start','Start'],['finish','Finish'],['percent','%'],['status','Status','status']]);
 document.getElementById('contracts').innerHTML=form('Contract',[['project','Project','select',options(db.projects,'projectName')],['party','Client/Subcontractor'],['type','Type','select','<option>Owner Contract</option><option>Subcontract</option><option>Purchase Order</option>'],['amount','Amount','number'],['dateSigned','Date Signed','date'],['status','Status','select','<option>Draft</option><option>Active</option><option>Closed</option>'],['notes','Notes','textarea']],'contracts')+table('contracts',[['project','Project'],['party','Party'],['type','Type'],['amount','Amount'],['dateSigned','Signed'],['status','Status','status']]);
 document.getElementById('payapps').innerHTML=form('Pay Application',[['project','Project','select',options(db.projects,'projectName')],['number','Pay App No.'],['period','Billing Period'],['amount','Amount','number'],['retainage','Retainage','number'],['status','Status','select','<option>Draft</option><option>Submitted</option><option>Approved</option><option>Paid</option>'],['notes','Notes','textarea']],'payapps')+table('payapps',[['project','Project'],['number','No.'],['period','Period'],['amount','Amount'],['retainage','Retainage'],['status','Status','status']]);
 document.getElementById('changes').innerHTML=form('Change Order',[['project','Project','select',options(db.projects,'projectName')],['number','CO / COR No.'],['title','Title'],['amount','Amount','number'],['days','Days Added','number'],['status','Status','select','<option>Draft</option><option>Submitted</option><option>Approved</option><option>Rejected</option><option>Closed</option>'],['notes','Scope / Notes','textarea']],'changes')+table('changes',[['project','Project'],['number','No.'],['title','Title'],['amount','Amount'],['days','Days'],['status','Status','status']]);
 document.getElementById('daily').innerHTML=form('Daily Report',[['project','Project','select',options(db.projects,'projectName')],['reportDate','Date','date'],['weather','Weather'],['manpower','Manpower'],['work','Work Performed','textarea'],['issues','Issues / Delays','textarea'],['safety','Safety Notes','textarea']],'daily')+table('daily',[['project','Project'],['reportDate','Date'],['weather','Weather'],['manpower','Manpower'],['work','Work']]);
 document.getElementById('punch').innerHTML=form('Punch / Closeout Item',[['project','Project','select',options(db.projects,'projectName')],['area','Area'],['item','Item'],['responsible','Responsible'],['due','Due','date'],['status','Status','select','<option>Open</option><option>Pending</option><option>Complete</option><option>Closed</option>'],['notes','Notes','textarea']],'punch')+table('punch',[['project','Project'],['area','Area'],['item','Item'],['responsible','Responsible'],['due','Due'],['status','Status','status']]);
 document.getElementById('documents').innerHTML=`<div class="card"><h2>Document Control Center</h2><div class="notice"><b>PDF Storage Note:</b> This single-file app is best used to store document records and links to PDFs in iCloud Drive, OneDrive, Google Drive, or GitHub folders. Large embedded PDFs can exceed iPad browser storage limits.</div><br><div class="formgrid"><div><label>Project</label><select id="project">${options(db.projects,'projectName')}</select></div><div><label>Document Type</label><select id="type"><option>Drawing</option><option>Specification</option><option>Permit</option><option>RFI Attachment</option><option>Submittal PDF</option><option>Contract</option><option>Pay App</option><option>Photo</option><option>Closeout</option></select></div><div><label>Title</label><input id="title"></div><div><label>Revision / Version</label><input id="revision"></div><div><label>PDF / Folder Link</label><input id="link" placeholder="Paste iCloud, Drive, OneDrive, GitHub or file link"></div><div><label>Status</label><select id="status"><option>Current</option><option>Superseded</option><option>Pending</option><option>Archived</option></select></div><div style="grid-column:1/-1"><label>Notes</label><textarea id="notes"></textarea></div></div><p><button onclick="submitForm('documents')">Save Document Record</button></p></div>`+table('documents',[['project','Project'],['type','Type'],['title','Title'],['revision','Rev'],['link','Link'],['status','Status','status']]);
 document.getElementById('reports').innerHTML=`<div class="card"><h2>Executive Reports</h2><p>Use Print Reports to create a PDF from your iPad. The dashboard and all active logs will print in a clean format.</p><button onclick="window.print()">Print / Save PDF Report</button></div><div class="card"><h3>Data Summary</h3><pre>${esc(JSON.stringify({counts:Object.fromEntries(Object.keys(db).map(k=>[k,db[k].length]))},null,2))}</pre></div>`;
}
function backupData(){let blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='Project_Manager_Enterprise_Backup_'+today()+'.json';a.click()}
function restoreData(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{db=JSON.parse(r.result);localStorage.setItem(KEY,JSON.stringify(db));renderAll();alert('Backup restored.')}catch(err){alert('Invalid JSON backup.')}};r.readAsText(f)}
function resetAll(){if(confirm('This clears all local records on this browser. Continue?')){db=JSON.parse(JSON.stringify(blank));save()}}
function seedDemo(){db.projects.push({id:uid('projects'),projectName:'Sample Commercial Buildout',number:'PME-001',client:'Sample Owner LLC',location:'Atlanta, GA',start:today(),finish:'2026-12-31',status:'Active',description:'Demo project'});db.clients.push({id:uid('clients'),name:'Sample Owner LLC',contact:'Owner Rep',phone:'',email:'',address:'',notes:''});db.rfis.push({id:uid('rfis'),project:'Sample Commercial Buildout',number:'RFI-001',subject:'Ceiling detail clarification',to:'Architect',due:today(),status:'Open',question:'Confirm ceiling detail.',answer:''});db.procurement.push({id:uid('procurement'),project:'Sample Commercial Buildout',item:'Rooftop HVAC Unit',vendor:'TBD',po:'',needBy:'2026-08-15',eta:'2026-08-30',longLead:'Yes',status:'Critical',notes:'Long lead item'});save()}
nav();renderAll();
</script>
</body>
</html>
