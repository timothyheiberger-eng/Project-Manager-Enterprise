<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Project Manager Enterprise Ver. 1.0</title>
<style>
:root{--bg:#07111f;--panel:#0d1b2f;--card:#122743;--card2:#18365a;--text:#eef6ff;--muted:#a9bad0;--line:#2d4968;--gold:#f5b942;--blue:#38bdf8;--green:#22c55e;--red:#ef4444;--orange:#fb923c;--purple:#a78bfa}*{box-sizing:border-box}html,body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(135deg,#06101e,#10253e);color:var(--text)}header{position:sticky;top:0;z-index:50;background:rgba(7,17,31,.96);border-bottom:1px solid var(--line);padding:14px 18px;display:flex;gap:12px;align-items:center}.seal{width:52px;height:52px;border-radius:16px;background:linear-gradient(135deg,var(--gold),#ffe08a);color:#07111f;display:grid;place-items:center;font-weight:900;font-size:20px;box-shadow:0 8px 24px rgba(245,185,66,.25)}h1{font-size:23px;margin:0}.sub{color:var(--muted);font-size:12px}.toolbar{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}.layout{display:grid;grid-template-columns:245px 1fr;min-height:calc(100vh - 82px)}nav{background:#0a1728;border-right:1px solid var(--line);padding:12px;position:sticky;top:81px;height:calc(100vh - 81px);overflow:auto}nav button{width:100%;text-align:left;background:transparent;color:var(--text);border:1px solid transparent;margin:3px 0;padding:10px 11px;border-radius:11px}nav button.active,nav button:hover{background:#173456;border-color:var(--line)}.content{padding:18px}.section{display:none}.section.active{display:block}.hero{background:linear-gradient(135deg,#10294a,#183b62);border:1px solid var(--line);border-radius:18px;padding:18px;margin-bottom:16px;display:flex;gap:14px;align-items:center;justify-content:space-between;flex-wrap:wrap}.hero h2{margin:0;font-size:24px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(235px,1fr));gap:14px}.card{background:rgba(18,39,67,.95);border:1px solid var(--line);border-radius:17px;padding:15px;box-shadow:0 12px 35px rgba(0,0,0,.18)}.card h3{margin:0 0 10px;color:#fff}.kpi{font-size:32px;font-weight:900;color:var(--gold)}.kpiLabel{color:var(--muted);font-size:12px;margin-top:4px}.money{color:#bef264}.warn{color:#fbbf24}.bad{color:#fca5a5}.goodText{color:#86efac}button,input,select,textarea{font:inherit}button{border:0;border-radius:10px;padding:10px 13px;background:var(--gold);color:#07111f;font-weight:800;cursor:pointer}.secondary{background:#223a57;color:var(--text);border:1px solid var(--line)}.danger{background:var(--red);color:#fff}.good{background:var(--green);color:#04130a}.blue{background:var(--blue);color:#04111c}form{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px;margin:10px 0}.wide{grid-column:1/-1}.half{grid-column:span 2}label{font-size:12px;color:var(--muted)}input,select,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#071827;color:var(--text)}textarea{min-height:78px}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.search{max-width:360px}.tableWrap{overflow:auto;border-radius:12px;border:1px solid var(--line);margin-top:12px}table{width:100%;border-collapse:collapse;background:#0b1829;min-width:900px}th,td{padding:9px;border-bottom:1px solid var(--line);text-align:left;font-size:13px;vertical-align:top}th{background:#10243c;color:#dbeafe;position:sticky;top:0}.actions{display:flex;gap:6px;flex-wrap:wrap}.mini{padding:6px 8px;font-size:12px}.pill{display:inline-block;padding:4px 9px;border-radius:999px;background:#1f3a5a;color:#dbeafe;font-size:12px}.open{background:#273e60}.closed{background:#123d2b;color:#bbf7d0}.late{background:#4a1d1d;color:#fecaca}.pending{background:#4a371d;color:#fde68a}.footer{color:var(--muted);font-size:12px;text-align:center;padding:14px}.note{font-size:13px;color:var(--muted);line-height:1.45}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}.tabs button{background:#173456;color:#fff;border:1px solid var(--line)}.tabs button.active{background:var(--gold);color:#06101e}.printOnly{display:none}.brandbox{font-weight:900;color:var(--gold)}@media(max-width:850px){.layout{grid-template-columns:1fr}header{align-items:flex-start}.toolbar{width:100%;margin-left:0}.layout nav{position:static;height:auto;display:grid;grid-template-columns:repeat(2,1fr)}.content{padding:12px}h1{font-size:19px}.hero h2{font-size:20px}table{min-width:760px}}@media print{header,nav,.toolbar,.noPrint,button,.tabs,.search{display:none!important}.layout{display:block}.content{padding:0}.section{display:block;page-break-after:always}.card,.hero{box-shadow:none;border:1px solid #999;color:#000;background:#fff}.printOnly{display:block}body{background:#fff;color:#000}input,select,textarea{border:0;color:#000;background:#fff}table{color:#000;background:#fff}th{color:#000;background:#eee}.kpi{color:#000}}
</style>
</head>
<body>
<header><div class="seal">PME</div><div><h1>Project Manager Enterprise Ver. 1.0</h1><div class="sub">Commercial Construction Management • GitHub Pages • Local Browser Database</div></div><div class="toolbar noPrint"><button onclick="backupData()">Backup JSON</button><button class="secondary" onclick="document.getElementById('restoreFile').click()">Restore JSON</button><input hidden id="restoreFile" type="file" accept="application/json" onchange="restoreData(event)"><button class="secondary" onclick="window.print()">Print</button></div></header>
<div class="layout"><nav id="nav" class="noPrint"></nav><main class="content" id="content"></main></div><div class="footer">All records save to this browser/device with localStorage. Use Backup JSON often before replacing this file on GitHub.</div>
<script>
const KEY='project_manager_enterprise_v1_full';
const modules=[['dashboard','Executive Dashboard'],['projects','Projects'],['clients','Clients / Owners'],['subs','Subcontractors'],['contracts','Contracts & COI'],['budget','Budget / Cost'],['payapps','Pay Applications'],['changeorders','Change Orders'],['rfis','RFI Log'],['submittals','Submittal Log'],['procurement','Procurement'],['schedule','Schedule'],['tasks','Tasks'],['dailyreports','Daily Reports'],['punch','Punch / Closeout'],['settings','Settings']];
const schemas={
projects:['Project Name','Project Number','Client / Owner','Address','Project Manager','Superintendent','Start Date','Target Completion','Status','Contract Amount','Approved COs','Notes'],
clients:['Client / Owner Name','Contact Name','Phone','Email','Address','Billing Terms','Notes'],
subs:['Company','Trade','Contact','Phone','Email','COI Expiration','W9 Received','Prequalified','Notes'],
contracts:['Project','Company / Owner','Type','Original Amount','Approved Changes','Current Contract','Executed Date','COI Expiration','Status','Notes'],
budget:['Project','Cost Code','Description','Original Budget','Approved Changes','Committed','Actual Cost','Forecast Cost','Variance Notes'],
payapps:['Project','Pay App #','Period Ending','Contract Amount','Work Completed','Stored Materials','Retainage %','Previous Paid','Amount Due','Status','Notes'],
changeorders:['Project','CO #','Title','Reason','Submitted Date','Approved Date','Amount','Days Added','Status','Notes'],
rfis:['Project','RFI #','Subject','Question','Submitted By','Date Sent','Due Date','Date Answered','Status','Response','Cost / Schedule Impact'],
submittals:['Project','Submittal #','Spec Section','Description','Subcontractor','Date Sent','Due Date','Date Returned','Status','Architect Response','Notes'],
procurement:['Project','Item / Material','Vendor / Sub','Needed By','Order Date','Expected Delivery','Actual Delivery','Status','Cost','Long Lead','Notes'],
schedule:['Project','Activity','Phase','Start Date','Finish Date','Duration','Predecessor','Responsible Party','Status','Notes'],
tasks:['Project','Task','Assigned To','Priority','Due Date','Status','Notes'],
dailyreports:['Project','Date','Superintendent','Weather','Manpower','Work Performed','Inspections','Delays / Issues','Safety Notes','Visitors','Photos / File Notes'],
punch:['Project','Item','Location','Responsible Party','Date Added','Due Date','Completed Date','Status','Closeout Document','Notes'],
settings:['Company Name','Address','Phone','Email','Default PM','Default Superintendent','Notes']
};
const statuses=['Open','Pending','Submitted','Approved','Rejected','Complete','Closed','On Hold'];
let db=loadDB(), current='dashboard', edit={};
function emptyDB(){let o={};Object.keys(schemas).forEach(k=>o[k]=[]);return o}
function loadDB(){try{return JSON.parse(localStorage.getItem(KEY))||emptyDB()}catch(e){return emptyDB()}}
function saveDB(){localStorage.setItem(KEY,JSON.stringify(db));render()}
function id(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function money(v){let n=parseFloat(String(v||'').replace(/[$,]/g,''));return isNaN(n)?0:n}
function fmt(n){return '$'+Number(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}
function daysLate(d,status){if(!d||['Closed','Complete','Approved'].includes(status))return 0;let x=new Date(d+'T23:59:59');let t=new Date();return t>x?Math.ceil((t-x)/86400000):0}
function nav(){document.getElementById('nav').innerHTML=modules.map(m=>`<button class="${current==m[0]?'active':''}" onclick="current='${m[0]}';render()">${m[1]}</button>`).join('')}
function render(){nav();document.getElementById('content').innerHTML=current==='dashboard'?dashboardHTML():moduleHTML(current)}
function dashboardHTML(){let p=db.projects.length, openR=db.rfis.filter(r=>!['Closed','Approved','Complete'].includes(r.Status)).length, openS=db.submittals.filter(r=>!['Closed','Approved','Complete'].includes(r.Status)).length, openPunch=db.punch.filter(r=>!['Closed','Complete','Approved'].includes(r.Status)).length;let contract=sum('projects','Contract Amount')+sum('projects','Approved COs'), budget=sum('budget','Original Budget')+sum('budget','Approved Changes'), committed=sum('budget','Committed'), actual=sum('budget','Actual Cost'), forecast=sum('budget','Forecast Cost'), coPending=sumFilter('changeorders','Amount',r=>r.Status!=='Approved'&&r.Status!=='Closed'), amountDue=sumFilter('payapps','Amount Due',r=>r.Status!=='Paid'&&r.Status!=='Closed');let late=[...lateItems('rfis','Due Date'),...lateItems('submittals','Due Date'),...lateItems('procurement','Needed By'),...lateItems('tasks','Due Date'),...lateItems('punch','Due Date')];return `<section class="section active"><div class="hero"><div><h2>Executive Dashboard</h2><div class="note">Track projects, RFIs, submittals, procurement, pay apps, budget, schedule, daily reports, punch list, and closeout in one GitHub-ready HTML app.</div></div><div class="brandbox">Single File • iPad Optimized</div></div><div class="grid"><div class="card"><div class="kpi">${p}</div><div class="kpiLabel">Active Projects</div></div><div class="card"><div class="kpi">${openR}</div><div class="kpiLabel">Open RFIs</div></div><div class="card"><div class="kpi">${openS}</div><div class="kpiLabel">Open Submittals</div></div><div class="card"><div class="kpi">${openPunch}</div><div class="kpiLabel">Open Punch Items</div></div><div class="card"><div class="kpi money">${fmt(contract)}</div><div class="kpiLabel">Total Contract Value</div></div><div class="card"><div class="kpi money">${fmt(committed)}</div><div class="kpiLabel">Committed Costs</div></div><div class="card"><div class="kpi money">${fmt(actual)}</div><div class="kpiLabel">Actual Costs</div></div><div class="card"><div class="kpi ${contract-forecast<0?'bad':'goodText'}">${fmt(contract-forecast)}</div><div class="kpiLabel">Projected Margin / Variance</div></div><div class="card"><div class="kpi warn">${fmt(coPending)}</div><div class="kpiLabel">Pending Change Orders</div></div><div class="card"><div class="kpi warn">${fmt(amountDue)}</div><div class="kpiLabel">Open Pay App Amount Due</div></div></div><div class="card" style="margin-top:14px"><h3>Overdue / Critical Items</h3>${late.length?table(late.slice(0,20),['Module','Project','Item','Due Date','Days Late','Status']):'<p class="note">No overdue items found.</p>'}</div></section>`}
function sum(mod,field){return db[mod].reduce((a,r)=>a+money(r[field]),0)}function sumFilter(mod,field,fn){return db[mod].filter(fn).reduce((a,r)=>a+money(r[field]),0)}
function lateItems(mod,dueField){return db[mod].map(r=>({Module:modules.find(m=>m[0]==mod)?.[1]||mod,Project:r.Project||r['Project Name']||'',Item:r.Subject||r.Description||r.Task||r['Item / Material']||r.Item||r.Activity||'', 'Due Date':r[dueField]||'', 'Days Late':daysLate(r[dueField],r.Status),Status:r.Status||''})).filter(x=>x['Days Late']>0)}
function moduleHTML(mod){let title=modules.find(m=>m[0]==mod)[1], rows=db[mod]||[], fields=schemas[mod];return `<section class="section active"><div class="hero"><div><h2>${title}</h2><div class="note">Add, edit, search, print, and backup records. Data is stored locally on this device.</div></div><button class="blue" onclick="newRecord('${mod}')">+ New Record</button></div><div class="card"><div class="row"><input class="search" id="search_${mod}" placeholder="Search ${title}..." oninput="drawTable('${mod}')"><button class="secondary" onclick="exportCSV('${mod}')">Export CSV</button><button class="secondary" onclick="window.print()">Print ${title}</button></div><div id="form_${mod}">${formHTML(mod)}</div><div id="table_${mod}"></div></div></section>`}
function formHTML(mod){let fields=schemas[mod], r=edit[mod]||{};return `<form onsubmit="event.preventDefault();saveRecord('${mod}',this)">${fields.map(f=>fieldHTML(mod,f,r[f]||'')).join('')}<div class="wide row"><button>Save Record</button><button type="button" class="secondary" onclick="edit['${mod}']={};render()">Clear Form</button></div></form>`}
function fieldHTML(mod,f,v){let type=f.toLowerCase().includes('date')||f.includes('Due')||f.includes('Completion')||f.includes('Needed')||f.includes('Ending')||f.includes('Delivery')?'date':(f.toLowerCase().includes('amount')||f.includes('Cost')||f.includes('Budget')||f.includes('Paid')||f.includes('Materials')||f.includes('Retainage')||f.includes('Changes')||f.includes('Committed')||f.includes('Forecast')?'number':'text');if(['Notes','Question','Response','Work Performed','Delays / Issues','Safety Notes','Visitors','Photos / File Notes','Variance Notes','Cost / Schedule Impact'].includes(f))return `<div class="wide"><label>${f}</label><textarea name="${f}">${esc(v)}</textarea></div>`;if(f==='Status')return `<div><label>${f}</label><select name="${f}">${statuses.map(s=>`<option ${v==s?'selected':''}>${s}</option>`).join('')}</select></div>`;if(f==='Project')return `<div><label>${f}</label><select name="${f}"><option></option>${db.projects.map(p=>`<option ${v==p['Project Name']?'selected':''}>${esc(p['Project Name'])}</option>`).join('')}</select></div>`;return `<div><label>${f}</label><input name="${f}" type="${type}" value="${esc(v)}" ${type==='number'?'step="0.01"':''}></div>`}
function saveRecord(mod,form){let obj={_id:(edit[mod]&&edit[mod]._id)||id()};schemas[mod].forEach(f=>obj[f]=form.elements[f]?.value||'');let i=db[mod].findIndex(x=>x._id===obj._id);if(i>=0)db[mod][i]=obj;else db[mod].push(obj);edit[mod]={};saveDB()}
function newRecord(mod){edit[mod]={};render();setTimeout(()=>document.querySelector('form input, form select, form textarea')?.focus(),100)}
function editRecord(mod,rid){edit[mod]=db[mod].find(r=>r._id===rid)||{};render();window.scrollTo({top:0,behavior:'smooth'})}
function delRecord(mod,rid){if(confirm('Delete this record?')){db[mod]=db[mod].filter(r=>r._id!==rid);saveDB()}}
function drawTable(mod){let q=(document.getElementById('search_'+mod)?.value||'').toLowerCase(), fields=schemas[mod];let rows=(db[mod]||[]).filter(r=>JSON.stringify(r).toLowerCase().includes(q));document.getElementById('table_'+mod).innerHTML=rows.length?`<div class="tableWrap">${table(rows,fields,true,mod)}</div>`:'<p class="note">No records yet. Tap + New Record or fill out the form above.</p>'}
function table(rows,fields,acts=false,mod=''){return `<table><thead><tr>${fields.map(f=>`<th>${f}</th>`).join('')}${acts?'<th>Actions</th>':''}</tr></thead><tbody>${rows.map(r=>`<tr>${fields.map(f=>`<td>${cell(r[f],f,r.Status)}</td>`).join('')}${acts?`<td><div class="actions"><button class="mini secondary" onclick="editRecord('${mod}','${r._id}')">Edit</button><button class="mini danger" onclick="delRecord('${mod}','${r._id}')">Delete</button></div></td>`:''}</tr>`).join('')}</tbody></table>`}
function cell(v,f,status){v=esc(v||''); if(f==='Status')return `<span class="pill ${statusClass(v)}">${v}</span>`; return v}
function statusClass(s){s=String(s).toLowerCase();if(s.includes('closed')||s.includes('complete')||s.includes('approved'))return 'closed';if(s.includes('reject')||s.includes('hold'))return 'late';if(s.includes('pending')||s.includes('submitted'))return 'pending';return 'open'}
function esc(s){return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function backupData(){let blob=new Blob([JSON.stringify({app:'Project Manager Enterprise Ver. 1.0',date:new Date().toISOString(),db},null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='Project_Manager_Enterprise_Backup_'+new Date().toISOString().slice(0,10)+'.json';a.click()}
function restoreData(e){let f=e.target.files[0];if(!f)return;let reader=new FileReader();reader.onload=()=>{try{let data=JSON.parse(reader.result);db=data.db||data;localStorage.setItem(KEY,JSON.stringify(db));alert('Backup restored successfully.');render()}catch(err){alert('Could not restore JSON file.')}};reader.readAsText(f)}
function exportCSV(mod){let fields=schemas[mod], rows=db[mod]||[];let csv=[fields.join(',')].concat(rows.map(r=>fields.map(f=>'"'+String(r[f]||'').replace(/"/g,'""')+'"').join(','))).join('\n');let blob=new Blob([csv],{type:'text/csv'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=mod+'_export.csv';a.click()}
setInterval(()=>localStorage.setItem(KEY,JSON.stringify(db)),5000);
render();setTimeout(()=>{if(current!=='dashboard')drawTable(current)},50);
const oldRender=render;render=function(){nav();document.getElementById('content').innerHTML=current==='dashboard'?dashboardHTML():moduleHTML(current); if(current!=='dashboard')setTimeout(()=>drawTable(current),0)};render();
</script>
</body>
</html>
